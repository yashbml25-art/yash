<!DOCTYPE html>
<html>
<head>
    <title>4x4 Student Table</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #667eea, #764ba2);
            padding: 50px;
        }

        table {
            width: 60%;
            margin: auto;
            border-collapse: collapse;
            background-color: white;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            border-radius: 10px;
            overflow: hidden;
        }

        caption {
            font-size: 28px;
            font-weight: bold;
            color: white;
            margin-bottom: 15px;
            letter-spacing: 3px;
        }

        th, td {
            padding: 15px;
            text-align: center;
        }

        th {
            background-color: #667eea;
            color: white;
        }

        td {
            border-bottom: 1px solid #ddd;
        }

        tr:hover td {
            background-color: #f2f2f2;
        }
    </style>
</head>

<body>

    <table>
        <caption>Student Records</caption>

        <tr>
            <th>Roll No</th>
            <th>Name</th>
            <th>Branch</th>
            <th>Marks</th>
        </tr>

        <tr>
            <td>101</td>
            <td>Yash</td>
            <td>AIML</td>
            <td>80</td>
        </tr>

        <tr>
            <td>102</td>
            <td>Vijay</td>
            <td>IT</td>
            <td>78</td>
        </tr>

        <tr>
            <td>103</td>
            <td>Shiva</td>
            <td>CSS</td>
            <td>72</td>
        </tr>

    </table>

</body>
</html>
