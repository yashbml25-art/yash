<body>  
<h1>HTML5 APIs Demo</h1>  
<div class="container">  
<!-- Drag & Drop -->  
<div class="card">  
<h2>Drag & Drop</h2>  
<div id="dragBox" class="box" draggable="true">Drag</div>  
<div id="dropZone" class="dropzone">Drop Here</div>  
</div>  
<!-- Geolocation -->  
<div class="card">  
<h2>Geolocation</h2>  
<button onclick="getLocation()">Get Location</button>  
<p id="location"></p>  
</div>  
Department of First Year, S.B.J.I.T.M.R., Nagpur  
Web Designing Lab (N-VSCCM102P)  
<!-- Web Storage -->  
<div class="card">  
<h2>Web Storage</h2>  
<input type="text" id="name" placeholder="Enter Name">  
<br>  
<button onclick="saveData()">Save</button>  
<button onclick="loadData()">Load</button>  
<button onclick="clearData()">Clear</button>  
<p id="output"></p>  
</div>  
</div>  
<script>  
// Drag & Drop let dragBox = 
document.getElementById("dragBox");  
let dropZone = document.getElementById("dropZone");  
dragBox.ondragstart = function(event) {     
event.dataTransfer.setData("text", event.target.id);  
};  
dropZone.ondragover = function(event) {  
event.preventDefault();  
};  
dropZone.ondrop = function(event) {     
event.preventDefault();  
let data = event.dataTransfer.getData("text");  
event.target.appendChild(document.getElementById(data)); };  
// Geolocation function getLocation() {     let output = 
document.getElementById("location");  
if (navigator.geolocation) {         
navigator.geolocation.getCurrentPosition(  
function(position) {                 
output.innerHTML =   
"Latitude: " + position.coords.latitude +  
"<br>Longitude: " + position.coords.longitude;  
},             function() {                 
output.innerHTML = "Permission denied!";  
}  
Department of First Year, S.B.J.I.T.M.R., Nagpur  
Web Designing Lab (N-VSCCM102P)  
);  
} else {  
output.innerHTML = "Geolocation not supported";  
}  
}  
// Web Storage function saveData() {     
let name = 
document.getElementById("name").value;     
localStorage.setItem("username", name);  
alert("Data Saved!");  
}  
function loadData() {  
let name = localStorage.getItem("username");     
document.getElementById("output").innerText = "Stored Name: " + name;  
}  
function clearData() {  
localStorage.removeItem("username");     
document.getElementById("output").innerText = "Data Cleared!";  
}  
</script>  
</body>
